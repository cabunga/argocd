---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prod
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginxdemos/hello:latest
          ports:
            - containerPort: 80
          env:
          - name: db-user
            valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
          - name: db-password
            valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password              
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: prod
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
