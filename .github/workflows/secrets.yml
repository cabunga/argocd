name: Update Sealed Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prd

jobs:
  update-secret:
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    permissions:
      contents: write

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install kubeseal
        run: |
          wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.1/kubeseal-0.26.1-linux-amd64.tar.gz
          tar -xvzf kubeseal-0.26.1-linux-amd64.tar.gz
          sudo install -m 755 kubeseal /usr/local/bin/kubeseal
          #wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/kubeseal-linux-amd64.tar.gz
          #tar -xvzf kubeseal-linux-amd64.tar.gz
          #chmod +x kubeseal
          #sudo mv kubeseal /usr/local/bin/

      - name: Rebuild certificate from GitHub secret
        run: |
          echo "${{ secrets.SEALED_SECRET_CERT }}_${ENVIRONMENT}" > cert.pem
          cat cert.pem
      - name: Generate temporary secret yaml
        run: |
          cat <<EOF > secret.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: db-credentials
            namespace: ${ENVIRONMENT}
          type: Opaque
          stringData:
            DB_PASSWORD: "${{ secrets.DB_PASSWORD }}"
          EOF

      - name: Define target file
        run: |
          echo "TARGET_FILE=k8s/${ENVIRONMENT}/secrets/sealed-secret.yaml" >> $GITHUB_ENV

      - name: Seal secret
        run: |
          kubeseal \
            --cert cert.pem \
            -o yaml \
            < secret.yaml \
            > ${TARGET_FILE}

      - name: Validate output
        run: |
          cat ${TARGET_FILE}

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add ${TARGET_FILE}

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update sealed secret for ${ENVIRONMENT}"
            git push
          fi
