name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: |
        cd app
         export IMGTAG=$(git -C ${{ env.AppWorkDir }} rev-parse --short="${{ env.hashlenght }}" HEAD)
          echo "IMGTAG=$IMGTAG" >> "$GITHUB_OUTPUT"
        docker build . --file Dockerfile --tag cabunga/argocdtest:$IMGTAG
        docker push cabunga/argocdtest:$IMGTAG
